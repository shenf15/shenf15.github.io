<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动一下｜开放免费的运动平台</title>
  <meta name="description" content="动一下是一个开放、免费的运动平台，连接运动爱好者、教练与场馆，帮助用户发现伙伴、组织活动、分享内容，加入属于自己的运动生活圈。" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background: #f7f8f5;
      color: #111;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 28px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .tag {
      font-size: 14px;
      color: #666;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 40px 8% 80px;
    }

    .hero {
      max-width: 980px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e9f7ef;
      color: #0b7a3b;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(42px, 7vw, 88px);
      line-height: 1.05;
      margin: 0;
      letter-spacing: -0.06em;
      max-width: 920px;
    }

    .subtitle {
      margin-top: 28px;
      font-size: clamp(18px, 2.2vw, 28px);
      line-height: 1.6;
      color: #333;
      max-width: 760px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 56px;
      max-width: 900px;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: #666;
      line-height: 1.7;
      font-size: 15px;
    }

    footer {
      padding: 28px 8%;
      color: #777;
      font-size: 14px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    footer a {
      color: #555;
      text-decoration: none;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        gap: 8px;
        flex-direction: column;
      }

      main {
        padding-top: 20px;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="brand">动一下</div>
      <div class="tag">开放 · 免费 · 运动平台</div>
    </header>

    <main>
      <section class="hero">
        <div class="badge">Open & Free Sports Community</div>

        <h1>让每个人都能找到自己的运动圈。</h1>

        <p class="subtitle">
          动一下是一个开放、免费的运动平台，连接运动爱好者、教练与场馆，帮助用户发现伙伴、组织活动、分享精彩瞬间，轻松加入属于自己的运动生活圈。
        </p>

        <div class="features">
          <div class="card">
            <h3>发现伙伴</h3>
            <p>根据运动项目、水平、时间与地点，找到合适的运动搭档。</p>
          </div>

          <div class="card">
            <h3>组织活动</h3>
            <p>发起约球、训练、比赛与线下活动，让运动安排更简单。</p>
          </div>

          <div class="card">
            <h3>连接场馆</h3>
            <p>帮助用户发现身边的运动空间，也帮助场馆触达真实运动人群。</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <span>© 2026 动一下</span>
      <span>Contact: utennistech@gmail.com</span>
      <a href="#">隐私政策</a>
      <a href="#">用户协议</a>
    </footer>
  </div>
</body>
</html>
